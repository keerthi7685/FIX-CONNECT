{% extends 'base.html' %}

{% block title %}Delete Appliance{% endblock %}

{% block content %}
<div class="page-wrapper">
  <div class="container">
    <div class="form-card">
      <h2><i class="fas fa-exclamation-triangle" style="color:var(--accent-danger);"></i> Delete Appliance</h2>
      <p class="subtitle">Are you sure you want to remove <strong>{{ appliance }}</strong>?</p>
      <p style="color:var(--text-muted);text-align:center;margin-bottom:24px;">This action cannot be undone.</p>

      <form method="post">
        {% csrf_token %}
        <div class="flex gap-1">
          <button type="submit" class="btn btn-danger btn-lg" style="flex:1;">
            <i class="fas fa-trash"></i> Delete
          </button>
          <a href="{% url 'appliance_list' %}" class="btn btn-secondary btn-lg" style="flex:1;">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
